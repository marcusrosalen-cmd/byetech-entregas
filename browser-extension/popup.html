<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Byetech Sync</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      background: #0f172a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
    }

    header {
      background: #1e293b;
      padding: 14px 16px;
      border-bottom: 1px solid #334155;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    header .logo {
      width: 28px;
      height: 28px;
      background: #3b82f6;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #f1f5f9;
    }

    header .subtitle {
      font-size: 11px;
      color: #64748b;
      margin-top: 1px;
    }

    .section {
      padding: 14px 16px;
      border-bottom: 1px solid #1e293b;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: #64748b;
      margin-bottom: 10px;
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 0;
    }

    .status-label {
      color: #94a3b8;
      font-size: 13px;
    }

    .badge {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 999px;
      white-space: nowrap;
    }

    .badge.ok      { background: #14532d; color: #4ade80; }
    .badge.warn    { background: #451a03; color: #fb923c; }
    .badge.error   { background: #450a0a; color: #f87171; }
    .badge.loading { background: #1e293b; color: #64748b; }

    #sync-btn {
      display: block;
      width: calc(100% - 32px);
      margin: 16px;
      padding: 11px 0;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    #sync-btn:hover:not(:disabled) { background: #2563eb; }
    #sync-btn:disabled { background: #1e3a5f; color: #475569; cursor: not-allowed; }

    #sync-btn .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }
    #sync-btn.loading .spinner { display: block; }
    #sync-btn.loading .btn-text { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }

    #result {
      margin: 0 16px 16px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.5;
      display: none;
    }
    #result.ok    { background: #14532d33; border: 1px solid #166534; color: #4ade80; }
    #result.error { background: #450a0a33; border: 1px solid #7f1d1d; color: #f87171; }

    details {
      border-top: 1px solid #1e293b;
    }

    summary {
      padding: 10px 16px;
      font-size: 12px;
      color: #64748b;
      cursor: pointer;
      user-select: none;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    summary::-webkit-details-marker { display: none; }
    summary::before {
      content: "▶";
      font-size: 9px;
      transition: transform .2s;
    }
    details[open] summary::before { transform: rotate(90deg); }
    summary:hover { color: #94a3b8; }

    .config-body {
      padding: 0 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .config-body label {
      font-size: 11px;
      color: #64748b;
      margin-bottom: 2px;
      display: block;
    }

    .config-body input {
      width: 100%;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 6px;
      color: #e2e8f0;
      padding: 7px 10px;
      font-size: 13px;
      outline: none;
    }
    .config-body input:focus { border-color: #3b82f6; }

    #save-config {
      align-self: flex-end;
      background: #1e293b;
      border: 1px solid #334155;
      color: #94a3b8;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 12px;
      cursor: pointer;
      margin-top: 4px;
    }
    #save-config:hover { border-color: #3b82f6; color: #3b82f6; }

    #saved-msg {
      font-size: 11px;
      color: #4ade80;
      display: none;
      align-self: flex-end;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">🚗</div>
    <div>
      <h1>Byetech Entregas</h1>
      <div class="subtitle">Sincronização de sessão</div>
    </div>
  </header>

  <div class="section">
    <div class="section-title">Status</div>
    <div class="status-row">
      <span class="status-label">Byetech CRM</span>
      <span id="crm-status" class="badge loading">verificando…</span>
    </div>
    <div class="status-row">
      <span class="status-label">Plataforma</span>
      <span id="platform-status" class="badge loading">verificando…</span>
    </div>
  </div>

  <button id="sync-btn" disabled>
    <div class="spinner"></div>
    <span class="btn-text">Sincronizar sessão</span>
  </button>

  <div id="result"></div>

  <details>
    <summary>Configurações</summary>
    <div class="config-body">
      <div>
        <label>URL da plataforma</label>
        <input id="platform-url" type="text" placeholder="https://byetech-entregas.onrender.com">
      </div>
      <div>
        <label>Secret (SESSION_PUSH_SECRET)</label>
        <input id="secret" type="password" placeholder="byetech-local">
      </div>
      <button id="save-config">Salvar</button>
      <span id="saved-msg">✓ Salvo</span>
    </div>
  </details>

  <script src="popup.js"></script>
</body>
</html>
