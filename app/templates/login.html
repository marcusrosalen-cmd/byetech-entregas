<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Byecar Entregas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap">
  <style>
    :root {
      --bg:           #001820;
      --surface:      #002838;
      --surface2:     #003D4A;
      --border:       #00607A;
      --border-light: #007A8A;
      --primary:      #00FFFF;
      --primary-dark: #00CCCC;
      --cream:        #FFF3D4;
      --cream-dim:    #C8D9CC;
      --muted:        #8AABA0;
      --danger:       #FF5A5A;
      --success:      #00E5A0;
      --radius:       10px;
      --glow:         0 0 20px rgba(0,255,255,.15);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--cream);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-wrap {
      width: 100%;
      max-width: 400px;
    }

    /* Logo */
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
      justify-content: center;
    }
    .logo-mark {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 1.2rem; color: var(--surface2);
    }
    .logo-text { font-size: 1.3rem; font-weight: 800; color: var(--cream); }
    .logo-sub  { color: var(--primary); font-weight: 600; }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
    }
    .card-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--cream);
      margin-bottom: 4px;
    }
    .card-subtitle {
      font-size: .8rem;
      color: var(--muted);
      margin-bottom: 28px;
    }

    /* Form */
    .field { margin-bottom: 16px; }
    label {
      display: block;
      font-size: .78rem;
      font-weight: 600;
      color: var(--cream-dim);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--cream);
      font-size: .9rem;
      padding: 10px 14px;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      font-family: inherit;
    }
    input:focus {
      border-color: var(--primary);
      box-shadow: var(--glow);
    }
    input::placeholder { color: var(--muted); }

    /* 2FA field — inicialmente oculto */
    #field-2fa { display: none; }

    /* Botão */
    .btn-login {
      width: 100%;
      background: var(--primary);
      color: var(--surface2);
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: background .15s, box-shadow .15s, transform .1s;
      font-family: inherit;
    }
    .btn-login:hover:not(:disabled) {
      background: var(--primary-dark);
      box-shadow: var(--glow);
    }
    .btn-login:active { transform: scale(.98); }
    .btn-login:disabled { opacity: .55; cursor: not-allowed; }

    /* Mensagens */
    .msg {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: .83rem;
      font-weight: 500;
      margin-bottom: 16px;
      display: none;
    }
    .msg.error  { background: rgba(255,90,90,.12);  color: var(--danger);  border: 1px solid rgba(255,90,90,.3); }
    .msg.info   { background: rgba(0,255,255,.08);  color: var(--primary); border: 1px solid rgba(0,255,255,.2); }
    .msg.success{ background: rgba(0,229,160,.1);   color: var(--success); border: 1px solid rgba(0,229,160,.3); }
    .msg.show   { display: block; }

    /* Spinner no botão */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(0,61,74,.4);
      border-top-color: var(--surface2);
      border-radius: 50%;
      animation: spin .6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
  </style>
</head>
<body>

<div class="login-wrap">

  <div class="logo">
    <div class="logo-mark">B</div>
    <div>
      <div class="logo-text">Byecar <span class="logo-sub">Entregas</span></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Acesso restrito</div>
    <div class="card-subtitle">Entre com suas credenciais do Byetech CRM</div>

    <div class="msg" id="msg"></div>

    <form id="form-login" onsubmit="handleSubmit(event)">
      <div class="field">
        <label for="email">E-mail</label>
        <input id="email" type="email" placeholder="seu@email.com" autocomplete="username" required />
      </div>

      <div class="field">
        <label for="senha">Senha</label>
        <input id="senha" type="password" placeholder="••••••••" autocomplete="current-password" required />
      </div>

      <div class="field" id="field-2fa">
        <label for="codigo2fa">Código 2FA</label>
        <input id="codigo2fa" type="text" placeholder="000000" maxlength="8" autocomplete="one-time-code" inputmode="numeric" />
      </div>

      <button type="submit" class="btn-login" id="btn-submit">Entrar</button>
    </form>
  </div>

</div>

<script>
  let _needs2fa = false;

  function showMsg(text, type = 'error') {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = `msg show ${type}`;
  }

  function hideMsg() {
    document.getElementById('msg').className = 'msg';
  }

  function setBusy(busy) {
    const btn = document.getElementById('btn-submit');
    if (busy) {
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Entrando...';
    } else {
      btn.disabled = false;
      btn.textContent = _needs2fa ? 'Verificar 2FA' : 'Entrar';
    }
  }

  async function handleSubmit(e) {
    e.preventDefault();
    hideMsg();
    setBusy(true);

    const email    = document.getElementById('email').value.trim();
    const senha    = document.getElementById('senha').value;
    const codigo2fa = document.getElementById('codigo2fa').value.trim() || null;

    try {
      const resp = await fetch('/api/byetech/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, senha, codigo_2fa: codigo2fa }),
      });
      const data = await resp.json();

      if (data.ok) {
        showMsg('✅ Login realizado! Redirecionando...', 'success');
        // Redireciona para a página solicitada ou para /
        const next = new URLSearchParams(window.location.search).get('next') || '/';
        setTimeout(() => { window.location.href = next; }, 600);
        return;
      }

      if (data.dois_fatores) {
        _needs2fa = true;
        document.getElementById('field-2fa').style.display = 'block';
        document.getElementById('codigo2fa').focus();
        showMsg('🔐 Código 2FA necessário — verifique seu aplicativo autenticador.', 'info');
        setBusy(false);
        return;
      }

      showMsg(data.msg || 'Credenciais inválidas.');
    } catch (err) {
      showMsg('Erro de conexão — tente novamente.');
    }

    setBusy(false);
  }

  // Auto-foco no campo de email
  document.getElementById('email').focus();
</script>

</body>
</html>
