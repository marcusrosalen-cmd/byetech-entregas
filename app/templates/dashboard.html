<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — Byetech Entregas</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0f1117;
      --card: #1a1d27;
      --border: #2d3048;
      --accent: #6c63ff;
      --red: #ef4444;
      --orange: #f97316;
      --yellow: #eab308;
      --green: #22c55e;
      --text: #e2e8f0;
      --muted: #94a3b8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; min-height: 100vh; }

    /* ── Topbar ── */
    .topbar {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topbar-logo { font-size: 18px; font-weight: 700; color: var(--accent); }
    .topbar-nav a {
      color: var(--muted);
      text-decoration: none;
      margin-left: 20px;
      font-size: 14px;
      transition: color 0.2s;
    }
    .topbar-nav a:hover, .topbar-nav a.active { color: var(--text); }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .btn-refresh {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 600;
    }
    .btn-refresh:hover { opacity: 0.88; }
    #last-updated { font-size: 12px; color: var(--muted); }

    /* ── Layout ── */
    .container { max-width: 1400px; margin: 0 auto; padding: 24px; }

    /* ── KPIs ── */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }
    .kpi-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 16px;
      text-align: center;
    }
    .kpi-card.red    { border-color: var(--red);    background: rgba(239,68,68,.08);  }
    .kpi-card.orange { border-color: var(--orange); background: rgba(249,115,22,.08); }
    .kpi-card.yellow { border-color: var(--yellow); background: rgba(234,179,8,.08);  }
    .kpi-card.green  { border-color: var(--green);  background: rgba(34,197,94,.08);  }
    .kpi-card.purple { border-color: var(--accent); background: rgba(108,99,255,.08); }
    .kpi-num {
      font-size: 36px;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 6px;
    }
    .kpi-card.red    .kpi-num { color: var(--red);    }
    .kpi-card.orange .kpi-num { color: var(--orange); }
    .kpi-card.yellow .kpi-num { color: var(--yellow); }
    .kpi-card.green  .kpi-num { color: var(--green);  }
    .kpi-card.purple .kpi-num { color: var(--accent); }
    .kpi-label { font-size: 12px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: .5px; }
    .kpi-sub   { font-size: 11px; color: var(--muted); margin-top: 4px; }

    /* ── Charts grid ── */
    .charts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }
    .charts-grid-3 {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }
    @media (max-width: 900px) {
      .charts-grid, .charts-grid-3 { grid-template-columns: 1fr; }
    }

    /* ── Chart cards ── */
    .chart-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }
    .chart-card h3 {
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 16px;
    }
    .chart-wrap { position: relative; height: 240px; }
    .chart-wrap.tall { height: 300px; }

    /* ── Tabela críticos ── */
    .table-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 24px;
    }
    .table-card h3 {
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 16px;
    }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th {
      text-align: left;
      padding: 8px 12px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      font-weight: 500;
      font-size: 12px;
      text-transform: uppercase;
    }
    td { padding: 10px 12px; border-bottom: 1px solid rgba(45,48,72,.5); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(108,99,255,.05); }
    .badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-red    { background: rgba(239,68,68,.15);  color: var(--red);    }
    .badge-orange { background: rgba(249,115,22,.15); color: var(--orange); }
    .badge-blue   { background: rgba(108,99,255,.15); color: #a78bfa; }
    .dias-atraso  { color: var(--red); font-weight: 700; }

    /* ── Loading ── */
    .loading { text-align: center; padding: 60px; color: var(--muted); font-size: 18px; }
    .spinner {
      display: inline-block;
      width: 32px; height: 32px;
      border: 3px solid rgba(108,99,255,.3);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">📦 Byetech Entregas</div>
  <nav class="topbar-nav">
    <a href="/">Contratos</a>
    <a href="/dashboard" class="active">Dashboard</a>
  </nav>
  <div class="topbar-right">
    <span id="last-updated">—</span>
    <button class="btn-refresh" onclick="loadData()">↻ Atualizar</button>
  </div>
</div>

<div class="container" id="app">
  <div class="loading">
    <div class="spinner"></div><br/>Carregando dados...
  </div>
</div>

<script>
const FONTE_COLOR = {
  'GWM':         '#6c63ff',
  'SIGN & DRIVE':'#22c55e',
  'LM':          '#06b6d4',
  'LOCALIZA':    '#eab308',
  'MOVIDA':      '#3b82f6',
  'UNIDAS':      '#a855f7',
  'VW':          '#f97316',
  'FLUA':        '#f43f5e',
  'NISSAN':      '#64748b',
};

let _charts = {};

function destroyCharts() {
  Object.values(_charts).forEach(c => c.destroy());
  _charts = {};
}

function fmt(n) { return n == null ? '—' : n.toLocaleString('pt-BR'); }

function renderKpis(k) {
  const perc = k.perc_atrasados;
  return `
  <div class="kpi-grid">
    <div class="kpi-card purple">
      <div class="kpi-num">${fmt(k.total_ativos)}</div>
      <div class="kpi-label">Contratos Ativos</div>
    </div>
    <div class="kpi-card red">
      <div class="kpi-num">${fmt(k.atrasados)}</div>
      <div class="kpi-label">Atrasados</div>
      <div class="kpi-sub">${perc}% da carteira</div>
    </div>
    <div class="kpi-card orange">
      <div class="kpi-num">${fmt(k.urgentes)}</div>
      <div class="kpi-label">Urgentes (1-2d)</div>
    </div>
    <div class="kpi-card orange" style="border-color:#f97316;background:rgba(249,115,22,.06)">
      <div class="kpi-num" style="color:#f97316">${fmt(k.criticos)}</div>
      <div class="kpi-label">Críticos (3-10d)</div>
    </div>
    <div class="kpi-card yellow">
      <div class="kpi-num">${fmt(k.alertas)}</div>
      <div class="kpi-label">Alertas (11-20d)</div>
    </div>
    <div class="kpi-card green">
      <div class="kpi-num">${fmt(k.ok)}</div>
      <div class="kpi-label">Em dia (>20d)</div>
    </div>
    <div class="kpi-card green" style="border-color:#0ea5e9;background:rgba(14,165,233,.06)">
      <div class="kpi-num" style="color:#0ea5e9">${fmt(k.entregas_semana)}</div>
      <div class="kpi-label">Entregues Semana</div>
      <div class="kpi-sub">${fmt(k.entregas_mes)} no mês</div>
    </div>
    <div class="kpi-card" style="border-color:#10b981;background:rgba(16,185,129,.06)">
      <div class="kpi-num" style="color:#10b981">${fmt(k.novas_vendas_8sem)}</div>
      <div class="kpi-label">Novas Vendas 8sem</div>
    </div>
  </div>`;
}

function renderCharts(d) {
  const fontes = d.por_fonte.map(f => f.fonte);
  const fonteColors = fontes.map(f => FONTE_COLOR[f] || '#94a3b8');

  return `
  <div class="charts-grid">
    <div class="chart-card">
      <h3>Ativos por Locadora</h3>
      <div class="chart-wrap"><canvas id="chartFonte"></canvas></div>
    </div>
    <div class="chart-card">
      <h3>Distribuição por Status</h3>
      <div class="chart-wrap"><canvas id="chartStatus"></canvas></div>
    </div>
  </div>
  <div class="charts-grid">
    <div class="chart-card">
      <h3>Entregas por Semana (8 sem)</h3>
      <div class="chart-wrap"><canvas id="chartEntregas"></canvas></div>
    </div>
    <div class="chart-card">
      <h3>Novas Vendas por Semana (8 sem)</h3>
      <div class="chart-wrap"><canvas id="chartVendas"></canvas></div>
    </div>
  </div>
  <div class="charts-grid-3">
    <div class="chart-card">
      <h3>Atrasados x Entregues — por Locadora</h3>
      <div class="chart-wrap tall"><canvas id="chartComparativo"></canvas></div>
    </div>
    <div class="chart-card">
      <h3>Urgência da Carteira</h3>
      <div class="chart-wrap tall"><canvas id="chartUrgencia"></canvas></div>
    </div>
  </div>`;
}

function renderTabela(top) {
  if (!top.length) return '<p style="color:var(--muted);text-align:center;padding:20px">Nenhum contrato atrasado</p>';
  const rows = top.map(c => {
    const dias = Math.abs(c.dias);
    return `<tr>
      <td><a href="/?search=${encodeURIComponent(c.id)}" style="color:var(--accent);text-decoration:none">${c.cliente_nome}</a></td>
      <td><span class="badge badge-blue">${c.fonte}</span></td>
      <td style="color:var(--muted);font-size:12px">${c.veiculo}</td>
      <td style="color:var(--muted);font-size:12px">${c.status}</td>
      <td>${c.data_prevista}</td>
      <td class="dias-atraso">-${dias}d</td>
    </tr>`;
  }).join('');
  return `<table>
    <thead><tr>
      <th>Cliente</th><th>Locadora</th><th>Veículo</th>
      <th>Status</th><th>Prev. Entrega</th><th>Atraso</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function initCharts(d, k) {
  const fontes = d.por_fonte.map(f => f.fonte);
  const fonteColors = fontes.map(f => FONTE_COLOR[f] || '#94a3b8');
  const cOpts = { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#94a3b8', font: { size: 11 } } } }, scales: { x: { ticks: { color: '#64748b', font:{size:11} }, grid: { color: '#1e2234' } }, y: { ticks: { color: '#64748b', font:{size:11} }, grid: { color: '#1e2234' } } } };

  // Ativos por fonte (horizontal bar)
  _charts.fonte = new Chart(document.getElementById('chartFonte'), {
    type: 'bar',
    data: {
      labels: fontes,
      datasets: [{
        label: 'Ativos',
        data: d.por_fonte.map(f => f.ativos),
        backgroundColor: fonteColors.map(c => c + 'cc'),
        borderColor: fonteColors,
        borderWidth: 1,
        borderRadius: 4,
      }]
    },
    options: { ...cOpts, indexAxis: 'y', plugins: { legend: { display: false } } }
  });

  // Por status (doughnut)
  const statusColors = ['#6c63ff','#22c55e','#3b82f6','#f97316','#eab308','#ef4444','#a855f7','#06b6d4','#f43f5e','#64748b'];
  _charts.status = new Chart(document.getElementById('chartStatus'), {
    type: 'doughnut',
    data: {
      labels: d.por_status.map(s => s.status),
      datasets: [{ data: d.por_status.map(s => s.total), backgroundColor: statusColors, borderWidth: 0, hoverOffset: 4 }]
    },
    options: { responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'right', labels: { color: '#94a3b8', font: { size: 10 }, padding: 10, boxWidth: 12 } } } }
  });

  // Entregas por semana (line)
  _charts.entregas = new Chart(document.getElementById('chartEntregas'), {
    type: 'line',
    data: {
      labels: d.semanas_labels,
      datasets: [{ label: 'Entregas', data: d.entregas_por_semana,
        borderColor: '#22c55e', backgroundColor: 'rgba(34,197,94,.1)',
        fill: true, tension: 0.3, pointBackgroundColor: '#22c55e', pointRadius: 4 }]
    },
    options: { ...cOpts, plugins: { legend: { display: false } } }
  });

  // Vendas por semana (bar)
  _charts.vendas = new Chart(document.getElementById('chartVendas'), {
    type: 'bar',
    data: {
      labels: d.semanas_labels,
      datasets: [{ label: 'Novas Vendas', data: d.vendas_por_semana,
        backgroundColor: 'rgba(108,99,255,.7)', borderColor: '#6c63ff',
        borderWidth: 1, borderRadius: 4 }]
    },
    options: { ...cOpts, plugins: { legend: { display: false } } }
  });

  // Comparativo atrasados x entregues por fonte (grouped bar)
  _charts.comp = new Chart(document.getElementById('chartComparativo'), {
    type: 'bar',
    data: {
      labels: fontes,
      datasets: [
        { label: 'Ativos', data: d.por_fonte.map(f => f.ativos), backgroundColor: 'rgba(108,99,255,.6)', borderRadius: 4 },
        { label: 'Entregues (8sem)', data: d.por_fonte.map(f => f.entregues), backgroundColor: 'rgba(34,197,94,.6)', borderRadius: 4 },
        { label: 'Atrasados', data: d.por_fonte.map(f => f.atrasados), backgroundColor: 'rgba(239,68,68,.6)', borderRadius: 4 },
      ]
    },
    options: { ...cOpts, plugins: { legend: { labels: { color: '#94a3b8', font: { size: 11 } } } } }
  });

  // Urgência da carteira (pie)
  _charts.urg = new Chart(document.getElementById('chartUrgencia'), {
    type: 'pie',
    data: {
      labels: ['Atrasados', 'Urgentes(1-2d)', 'Críticos(3-10d)', 'Alertas(11-20d)', 'Em dia'],
      datasets: [{
        data: [k.atrasados, k.urgentes, k.criticos, k.alertas, k.ok],
        backgroundColor: ['#ef4444','#f97316','#f59e0b','#eab308','#22c55e'],
        borderWidth: 0, hoverOffset: 6
      }]
    },
    options: { responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8', font: { size: 10 }, padding: 8, boxWidth: 12 } } } }
  });
}

async function loadData() {
  const app = document.getElementById('app');
  try {
    const res = await fetch('/api/stats/dashboard');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const d = await res.json();
    const k = d.kpis;

    destroyCharts();

    app.innerHTML = `
      ${renderKpis(k)}
      ${renderCharts(d)}
      <div class="table-card">
        <h3>Top Atrasados — Acao Imediata</h3>
        ${renderTabela(d.top_atrasados)}
      </div>
    `;

    setTimeout(() => initCharts(d, k), 50);

    const dt = new Date(d.gerado_em);
    document.getElementById('last-updated').textContent =
      'Atualizado: ' + dt.toLocaleTimeString('pt-BR');

  } catch(e) {
    app.innerHTML = `<div class="loading" style="color:var(--red)">Erro ao carregar dados: ${e.message}</div>`;
  }
}

loadData();

// Auto-refresh a cada 5 minutos
setInterval(loadData, 5 * 60 * 1000);
</script>
</body>
</html>
